<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Rides | ALIVFEST</title><link rel="stylesheet" href="style.css"></head><body><header class="header"><div class="shell header-inner"><a class="brand" href="index.html">ALIVFEST</a><nav class="nav"><a href="index.html">Home</a><a href="rides.html">Rides</a><a href="games.html">Games</a><a href="lineup.html">Lineup</a><a href="food-village.html">Food Village</a><a href="shop.html">Shop</a><a href="vip-tables.html">VIP Tables</a><a href="map.html">Map</a><a href="gallery.html">Gallery</a><a href="admin.html">Admin</a></nav></div></header><section class="section"><div class="shell center"><h1 class="display">Rides.</h1><p class="lead">Click a ride card and the preview panel updates instantly.</p></div></section><section class="section-tight"><div class="shell ride-browser"><div><div class="filterbar" data-filter-group data-target="#rideCards"><button class="filterchip active" data-filter="all">All Rides</button><button class="filterchip" data-filter="thrill">Thrill</button><button class="filterchip" data-filter="family">Family</button><button class="filterchip" data-filter="iconic">Iconic</button><button class="filterchip" data-filter="night">Night</button></div><div class="ride-cards" id="rideCards"></div></div><div class="preview-panel" id="ridePreview"></div></div></section><footer class="footer"><div class="shell footer-inner"><div><strong>ALIVFEST</strong><div style="margin-top:8px;color:#bbb;font-size:12px">© <span id="year"></span> • Accra • December Season</div></div><div class="footer-links"><a href="shop.html">Shop</a><a href="vip-tables.html">VIP Tables</a><a href="map.html">Map</a><a href="gallery.html">Gallery</a><a href="admin.html">Admin</a></div></div></footer><script src="site-data.js"></script><script src="script.js"></script>
<script>
const d = getSiteData(); const rides = d.rides || []; const cardsEl = document.getElementById('rideCards'); const previewEl = document.getElementById('ridePreview');
function renderPreview(idx){const ride=rides[idx]; if(!ride) return; previewEl.innerHTML = `<div class="product-visual">${escapeHtml(ride.emoji||'🎡')}</div><h3>${escapeHtml(ride.name)}</h3><p>${escapeHtml(ride.description)}</p><div class="tagrow"><span class="tag">Thrill ${escapeHtml(ride.thrill||'')}</span><span class="tag">${escapeHtml(ride.bestFor||'')}</span><span class="tag">${escapeHtml(ride.bestTime||'')}</span></div><div class="cta"><a class="btn gold" href="vip-tables.html">Add to My Festival Plan</a></div>`; document.querySelectorAll('.ride-card').forEach((el,i)=>el.classList.toggle('active', i===idx));}
cardsEl.innerHTML = rides.map((ride, idx) => `<div class="item ride-card" data-category="${escapeHtml(ride.category||'')}" onclick="window.__selectRide(${idx})"><div class="top"><div><h4>${escapeHtml(ride.name)}</h4><div class="meta-small">${escapeHtml(ride.bestTime||'')}</div></div><div class="tag">${escapeHtml(ride.emoji||'🎡')}</div></div><p>${escapeHtml(ride.description)}</p></div>`).join('');
window.__selectRide = function(i){ renderPreview(i); }; renderPreview(0);
</script>
</body></html>
