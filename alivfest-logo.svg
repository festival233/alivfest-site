<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1b8"/>
      <stop offset="25%" stop-color="#ffcf66"/>
      <stop offset="55%" stop-color="#ff9f1f"/>
      <stop offset="85%" stop-color="#c96d00"/>
      <stop offset="100%" stop-color="#8d4700"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="black"/>
  <text x="50%" y="55%" text-anchor="middle" font-size="180" font-weight="900"
        font-family="Arial Black, Impact, sans-serif" fill="url(#gold)" filter="url(#glow)"
        letter-spacing="-6">ALIVFEST</text>
</svg>
